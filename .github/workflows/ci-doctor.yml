name: "CI Doctor"

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *" # Run at 2 AM UTC

permissions:
  contents: read
  actions: read
  checks: read
  issues: write
  pull-requests: read

jobs:
  diagnose-failures:
    name: "Diagnose CI Failures"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure' }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get failed workflow run details
        id: run-details
        run: |
          RUN_ID="${{ github.event.workflow_run.id || github.run_id }}"
          
          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "## Failed Workflow Analysis" >> $GITHUB_OUTPUT
          echo "**Workflow**: ${{ github.event.workflow_run.name || github.workflow }}" >> $GITHUB_OUTPUT
          echo "**Run ID**: $RUN_ID" >> $GITHUB_OUTPUT
          echo "**Triggered by**: ${{ github.event.workflow_run.actor.login || github.actor }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          
          gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | {
              name: .name,
              conclusion: .conclusion,
              html_url: .html_url,
              started_at: .started_at
            }' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get workflow logs
        id: logs
        run: |
          RUN_ID="${{ github.event.workflow_run.id || github.run_id }}"
          gh run view $RUN_ID --log-failed 2>/dev/null | head -500 > failed-logs.txt || echo "No logs available" > failed-logs.txt
          echo "logs<<EOF" >> $GITHUB_OUTPUT
          cat failed-logs.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Diagnosis
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |
            {
              "tools": {
                "core": [
                  "run_shell_command(ls)",
                  "run_shell_command(cat)",
                  "run_shell_command(grep)"
                ]
              }
            }
          prompt: |
            You are an expert DevOps engineer. Diagnose this CI/CD failure.
            
            ## Failed Workflow
            Name: ${{ github.event.workflow_run.name || github.workflow }}
            Run ID: ${{ github.event.workflow_run.id || github.run_id }}
            
            ## Error Logs
            ```
            ${{ steps.logs.outputs.logs }}
            ```
            
            ## Your Task
            1. Identify the root cause of the failure.
            2. Use `ls` and `cat` to inspect relevant configuration files (e.g., package.json, workflows, scripts).
            3. Analyze error messages and stack traces.
            4. Provide a clear explanation and suggest a specific fix.
            
            Be specific and actionable.
          gemini_model: gemini-1.5-flash
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Create diagnostic issue
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary || steps.gemini.outputs.error || 'An error occurred during agent execution.' }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name || github.workflow }}"
          WORKFLOW_URL="${{ github.event.workflow_run.html_url || github.server_url/github.repository/actions/runs/github.run_id }}"
          
          cat > issue_body.md << EOF
          ## CI Failure Report

          ### Workflow: $WORKFLOW_NAME
          ### Run: $WORKFLOW_URL

          $SUMMARY

          ---
          *Automated diagnosis by CI Doctor*
          EOF

          gh issue create \
            --title "CI Failure: $WORKFLOW_NAME - $(date +'%Y-%m-%d')" \
            --body-file issue_body.md \
            --label "automated,needs-attention"

  nightly-health-check:
    name: "Nightly CI Health Check"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check recent workflow runs
        id: health-check
        run: |
          echo "report<<EOF" >> $GITHUB_OUTPUT
          gh run list \
            --limit 20 \
            --json name,status,conclusion,startedAt,duration \
            --jq '.[] | "- \(.name): \(.conclusion // .status) (started: \(.startedAt))"' 2>/dev/null || echo "No runs found" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Analyze patterns
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Analyze these recent CI/CD workflow runs and identify any patterns or concerns.
            
            ## Recent Workflow Runs
            ${{ steps.health-check.outputs.report }}
            
            ## Your Task
            1. Identify recurring failures.
            2. Note performance trends.
            3. Suggest improvements.
            
            Keep it brief and actionable.
          gemini_model: gemini-1.5-flash
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Post health report
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary || steps.gemini.outputs.error || 'An error occurred during agent execution.' }}"
          
          gh issue create \
            --title "CI Health Report - $(date +'%Y-%m-%d')" \
            --body "$SUMMARY" \
            --label "ci-health,automated,report"
