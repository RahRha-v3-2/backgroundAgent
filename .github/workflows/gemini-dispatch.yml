name: "Gemini Dispatcher"

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  discussions: read
  statuses: read
  checks: read

jobs:
  dispatch:
    name: "Route Gemini Command"
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.parse.outputs.command }}
      target: ${{ steps.parse.outputs.target }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body || github.event.issue.body || github.event.pull_request_review_comment.body }}"
          COMMENT_LOWER=$(echo "$COMMENT" | tr '[:upper:]' '[:lower:]')
          
          if echo "$COMMENT_LOWER" | grep -q "@gemini-cli"; then
            COMMENT=$(echo "$COMMENT" | sed 's/@gemini-cli//gi')
          fi
          
          echo "comment=$COMMENT" >> $GITHUB_OUTPUT
          
          if echo "$COMMENT" | grep -q "/implement\|/fix\|/build\|/create"; then
            echo "command=implement" >> $GITHUB_OUTPUT
            echo "target=code" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/review"; then
            echo "command=review" >> $GITHUB_OUTPUT
            echo "target=pr" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/triage\|/classify"; then
            echo "command=triage" >> $GITHUB_OUTPUT
            echo "target=issue" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/doc\|/document"; then
            echo "command=document" >> $GITHUB_OUTPUT
            echo "target=doc" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/debug\|/diagnose\|/doctor"; then
            echo "command=debug" >> $GITHUB_OUTPUT
            echo "target=ci" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/explain"; then
            echo "command=explain" >> $GITHUB_OUTPUT
            echo "target=explain" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/help"; then
            echo "command=help" >> $GITHUB_OUTPUT
            echo "target=help" >> $GITHUB_OUTPUT
          else
            echo "command=assist" >> $GITHUB_OUTPUT
            echo "target=general" >> $GITHUB_OUTPUT
          fi

  help:
    name: "Help Command"
    runs-on: ubuntu-latest
    if: needs.dispatch.outputs.command == 'help'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Show help
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          HELP_BODY="## Gemini CLI Help\n\nAvailable commands:\n- /implement or /fix - Implement or fix code\n- /review - Review the pull request\n- /triage - Classify and triage this issue\n- /doc - Generate or update documentation\n- /debug or /doctor - Diagnose CI/build failures\n- /explain - Explain code or concepts\n- Any other text - General assistance\n\nExample: gemini-cli /implement Fix the login bug\n\n---\n*Powered by Gemini CLI*"
          gh api repos/$REPO/issues/$ISSUE_NUM/comments -f body="$HELP_BODY"

  assist:
    name: "General Assistance"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'assist' || needs.dispatch.outputs.command == 'explain'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are a helpful coding assistant for this repository. 
            
            ${{ github.event.comment.body || github.event.issue.body }}
            
            Repository context:
            - Owner: ${{ github.repository_owner }}
            - Repository: ${{ github.event.repository.name }}
            - Branch: ${{ github.ref_name }}
            
            Provide a helpful, actionable response. Include code examples when relevant.
            
            If this is a code explanation request, analyze the relevant files and provide a clear explanation.
            
            Respond concisely but thoroughly.
          settings: '{"model": "gemini-2.5-flash", "temperature": 0.7}'
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Post response
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary || steps.gemini.outputs.error || 'No response generated' }}"
          
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            RESPONSE_BODY="Gemini Assistant Response: $SUMMARY - Generated by Gemini CLI"
            gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments -f body="$RESPONSE_BODY"
          fi

  implement:
    name: "Implement Code"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'implement' && needs.dispatch.outputs.target == 'code'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Self-Coding Agent
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an expert software engineer. Your task is to implement the feature or fix described in this issue.
            
            ## Issue Description
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}
            
            ## Instructions
            1. First, analyze the codebase to understand the existing structure and patterns
            2. Read the GEMINI.md file for project-specific guidelines
            3. Implement the solution following the existing code style and conventions
            4. Write tests for any new functionality
            5. Ensure all tests pass
            6. Create a branch named `feature/issue-${{ github.event.issue.number }}` or `fix/issue-${{ github.event.issue.number }}`
            7. Push the changes and create a pull request
            8. Link the PR to this issue
            
            ## Important
            - Follow existing code patterns and conventions
            - Write clean, maintainable code
            - Include appropriate error handling
            - Add/update tests
            - Update documentation if needed
            
            If you cannot complete the implementation, create a detailed analysis of what needs to be done.
          settings: '{"model": "gemini-2.5-flash", "temperature": 0.3}'
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Update issue status
        if: always()
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          gh issue comment $ISSUE_NUM --body "Implementation started. Check Actions tab for progress. Powered by Gemini CLI."

  triage:
    name: "Issue Triage"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'triage' && needs.dispatch.outputs.target == 'issue'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Triage Agent
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an expert issue triage assistant. Analyze this GitHub issue and provide:
            
            ## Issue
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}
            
            ## Your Task
            1. **Classify the issue type**: bug, feature, enhancement, documentation, question, or other
            2. **Estimate complexity**: low, medium, or high
            3. **Suggest priority**: critical, high, medium, or low
            4. **Identify affected components**: Which parts of the codebase might be affected
            5. **Suggest labels**: Based on your analysis
            6. **Request clarification** if the issue is unclear
            
            Respond in this format:
            ```
            ## Triage Results
            - **Type**: [bug/feature/enhancement/docs/question/other]
            - **Complexity**: [low/medium/high]
            - **Priority**: [critical/high/medium/low]
            - **Components**: [affected components]
            - **Suggested Labels**: [comma-separated labels]
            - **Notes**: [any additional observations]
            ```
          settings: '{"model": "gemini-2.5-flash-lite", "temperature": 0.5}'
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Apply triage results
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary }}"
          
          # Extract labels from response and apply them
          if echo "$SUMMARY" | grep -qi "bug"; then
            gh issue edit ${{ github.event.issue.number }} --add-label "bug"
          fi
          if echo "$SUMMARY" | grep -qi "feature"; then
            gh issue edit ${{ github.event.issue.number }} --add-label "enhancement"
          fi
          if echo "$SUMMARY" | grep -qi "documentation"; then
            gh issue edit ${{ github.event.issue.number }} --add-label "documentation"
          fi
          if echo "$SUMMARY" | grep -qi "question"; then
            gh issue edit ${{ github.event.issue.number }} --add-label "question"
          fi
          if echo "$SUMMARY" | grep -qi "high\|critical"; then
            gh issue edit ${{ github.event.issue.number }} --add-label "priority: high"
          elif echo "$SUMMARY" | grep -qi "medium"; then
            gh issue edit ${{ github.event.issue.number }} --add-label "priority: medium"
          fi
          
          # Add triage comment
          gh issue comment ${{ github.event.issue.number }} --body "Triage complete. Summary: $SUMMARY - Automated by Gemini CLI"

  review:
    name: "Pull Request Review"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'review' && needs.dispatch.outputs.target == 'pr'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Code Review Agent
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an expert code reviewer. Review this pull request thoroughly.
            
            ## Pull Request
            Title: ${{ github.event.pull_request.title }}
            Body: ${{ github.event.pull_request.body }}
            Changes: ${{ github.event.pull_request.changed_files }} files
            
            ## Your Review Should Cover
            1. **Correctness**: Does the code do what it claims?
            2. **Security**: Any potential vulnerabilities?
            3. **Performance**: Any performance concerns?
            4. **Code Quality**: Style, readability, maintainability
            5. **Testing**: Are tests adequate?
            6. **Edge Cases**: Are they handled?
            7. **Breaking Changes**: Any API/interface changes?
            
            ## Output Format
            ```
            ## Code Review Summary
            
            ### Overall: [Approve / Request Changes / Comment]
            
            ### Issues Found
            - **[Critical/High/Medium/Low]**: Description and suggestion
            
            ### Suggestions
            - Any improvement ideas
            
            ### Praise
            - What was done well
            ```
            
            Be thorough but constructive. Focus on important issues.
          settings: '{"model": "gemini-2.5-flash", "temperature": 0.3}'
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Post review
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          
          # Post as PR review
          if echo "$SUMMARY" | grep -qi "request changes\|critical\|high"; then
            gh pr review $PR_NUMBER --body "$SUMMARY" --request-changes
          else
            gh pr review $PR_NUMBER --body "$SUMMARY" --approve
          fi

  document:
    name: "Documentation Update"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'document' && needs.dispatch.outputs.target == 'doc'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Documentation Agent
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are a technical documentation expert. Your task is to update or create documentation.
            
            ## Context
            ${{ github.event.issue.body || github.event.comment.body }}
            
            ## Task
            1. Read the existing README.md and relevant documentation
            2. Identify what documentation needs updating
            3. Update or create the necessary documentation files
            4. Ensure the documentation is clear, accurate, and follows the project's style
            
            ## Guidelines
            - Use clear, concise language
            - Include code examples where appropriate
            - Follow existing documentation style
            - Update related files (changelog, API docs, etc.)
            
            If changes are needed, create a branch and PR with the documentation updates.
          settings: '{"model": "gemini-2.5-flash-lite", "temperature": 0.4}'
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Notify completion
        if: always()
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          gh issue comment $ISSUE_NUM --body "Documentation update analyzed. Check repository for changes. Powered by Gemini CLI."

  debug:
    name: "CI Debug Doctor"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'debug' && needs.dispatch.outputs.target == 'ci'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get CI status
        run: |
          gh run list --workflow="*" --status=failure --limit 5 --json name,status,conclusion,headBranch,url

      - name: Run Debug Agent
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are a debugging expert. Diagnose the CI/CD failure.
            
            ## CI Failure Context
            ${{ github.event.issue.body || github.event.comment.body }}
            
            ## Recent Workflow Runs
            Check the recent failed workflow runs and analyze the logs.
            
            ## Your Task
            1. Identify the root cause of the failure
            2. Look at the error messages and stack traces
            3. Analyze the relevant code changes
            4. Provide a clear explanation of what went wrong
            5. Suggest a fix with code if applicable
            
            Be specific and actionable in your diagnosis.
          settings: '{"model": "gemini-2.5-flash", "temperature": 0.2}'
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Post diagnosis
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          
          gh issue comment $ISSUE_NUM --body "CI Diagnosis: $SUMMARY - Automated by Gemini CLI"
