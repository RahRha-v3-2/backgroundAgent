name: "Gemini Dispatcher"

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  discussions: read
  statuses: read
  checks: read
  actions: write

jobs:
  dispatch:
    name: "Route Gemini Command"
    runs-on: ubuntu-latest
    outputs:
      command: ${{ steps.parse.outputs.command }}
      target: ${{ steps.parse.outputs.target }}
      comment: ${{ steps.parse.outputs.comment }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body || github.event.issue.body || github.event.pull_request_review_comment.body || '' }}"
          COMMENT_LOWER=$(echo "$COMMENT" | tr '[:upper:]' '[:lower:]')
          
          if echo "$COMMENT_LOWER" | grep -q "@gemini-cli"; then
            COMMENT=$(echo "$COMMENT" | sed 's/@gemini-cli//gi')
          fi
          
          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if echo "$COMMENT" | grep -q "/implement\|/fix\|/build\|/create"; then
            echo "command=implement" >> $GITHUB_OUTPUT
            echo "target=code" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/review"; then
            echo "command=review" >> $GITHUB_OUTPUT
            echo "target=pr" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/triage\|/classify"; then
            echo "command=triage" >> $GITHUB_OUTPUT
            echo "target=issue" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/doc\|/document"; then
            echo "command=document" >> $GITHUB_OUTPUT
            echo "target=doc" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/debug\|/diagnose\|/doctor"; then
            echo "command=debug" >> $GITHUB_OUTPUT
            echo "target=ci" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/explain"; then
            echo "command=explain" >> $GITHUB_OUTPUT
            echo "target=explain" >> $GITHUB_OUTPUT
          elif echo "$COMMENT" | grep -q "/help"; then
            echo "command=help" >> $GITHUB_OUTPUT
            echo "target=help" >> $GITHUB_OUTPUT
          else
            echo "command=assist" >> $GITHUB_OUTPUT
            echo "target=general" >> $GITHUB_OUTPUT
          fi

  help:
    name: "Help Command"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'help'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Show help
        run: |
          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          HELP_BODY="## Gemini CLI Help\n\nAvailable commands:\n- /implement or /fix - Implement or fix code\n- /review - Review the pull request\n- /triage - Classify and triage this issue\n- /doc - Generate or update documentation\n- /debug or /doctor - Diagnose CI/build failures\n- /explain - Explain code or concepts\n- Any other text - General assistance\n\nExample: @gemini-cli /implement Fix the login bug\n\n---\n*Powered by Gemini CLI*"
          gh api repos/$REPO/issues/$ISSUE_NUM/comments -f body="$HELP_BODY"

  assist:
    name: "General Assistance"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'assist' || needs.dispatch.outputs.command == 'explain'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gemini CLI
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are a helpful coding assistant for this repository. 
            
            ${{ needs.dispatch.outputs.comment }}
            
            Repository context:
            - Owner: ${{ github.repository_owner }}
            - Repository: ${{ github.event.repository.name }}
            - Branch: ${{ github.ref_name }}
            
            Provide a helpful, actionable response. Include code examples when relevant.
            
            If this is a code explanation request, analyze the relevant files and provide a clear explanation.
            
            Respond concisely but thoroughly.
          gemini_model: gemini-1.5-flash
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Post response
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary || steps.gemini.outputs.error || 'No response generated' }}"
          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          
          cat > comment_body.md << EOF
          Gemini Assistant Response:

          $SUMMARY

          ---
          *Generated by Gemini CLI*
          EOF

          gh issue comment $ISSUE_NUM --body-file comment_body.md

  implement:
    name: "Trigger Implement"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'implement'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger Self-Coding Agent
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          if [ -n "$ISSUE_NUM" ]; then
            gh workflow run self-coding-agent.yml -f issue_number=$ISSUE_NUM
            gh issue comment $ISSUE_NUM --body "Triggered Self-Coding Agent for issue #$ISSUE_NUM. You can follow the progress in the Actions tab."
          else
            echo "Not an issue, cannot trigger implementation."
            true
          fi

  triage:
    name: "Trigger Triage"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'triage'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger Issue Triage
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          if [ -n "$ISSUE_NUM" ]; then
            gh workflow run scheduled-triage.yml -f limit=1
            gh issue comment $ISSUE_NUM --body "Triggered Triage Agent. Analysis will be posted shortly."
          else
            echo "Not an issue, cannot trigger triage."
            true
          fi

  review:
    name: "Trigger Review"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'review'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger PR Review
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
          IS_PR=$(gh pr view $PR_NUM --json number -q .number 2>/dev/null || echo "")
          if [ -n "$IS_PR" ]; then
            gh workflow run auto-pr-review.yml -f pr_number=$PR_NUM || echo "Workflow trigger failed."
            gh pr comment $PR_NUM --body "Triggered AI Code Review for PR #$PR_NUM."
          else
            gh issue comment $PR_NUM --body "Command /review is only available for Pull Requests."
          fi

  document:
    name: "Trigger Documentation"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'document'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger Documentation Sync
        run: |
          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh workflow run documentation-sync.yml
          gh issue comment $ISSUE_NUM --body "Triggered Documentation Sync Agent."

  debug:
    name: "Trigger Debug"
    runs-on: ubuntu-latest
    needs: dispatch
    if: needs.dispatch.outputs.command == 'debug'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger CI Doctor
        run: |
          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          gh workflow run ci-doctor.yml
          gh issue comment $ISSUE_NUM --body "Triggered CI Doctor Agent to diagnose failures."
