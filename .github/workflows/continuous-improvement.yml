name: "Continuous Improvement"

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-simplification:
    name: "Code Simplification Analysis"
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find largest files
        id: analyze
        run: |
          echo "large_files<<EOF" >> $GITHUB_OUTPUT
          find . -type f \( -name "*.js" -o -name "*.ts" -o -name "*.py" -o -name "*.go" \) -not -path "./node_modules/*" -exec wc -l {} + | sort -rn | head -20 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Simplification Analysis
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Analyze the codebase for simplification opportunities.
            
            ## Largest Files
            ${{ steps.analyze.outputs.large_files }}
          gemini_model: gemini-1.5-flash
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Create improvement report
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary || steps.gemini.outputs.error || 'Error' }}"
          cat > imp_report.md << EOF
          ## Weekly Code Simplification Analysis
          
          $SUMMARY
          EOF
          gh issue create --title "Weekly Code Simplification Report - $(date +'%Y-%m-%d')" --body-file imp_report.md --label "improvement,automated,report"
