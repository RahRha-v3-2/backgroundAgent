name: "Auto PR Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: read

jobs:
  review-pr:
    name: "AI Code Review"
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR details
        id: pr-details
        run: |
          PR_NUM="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
          echo "pr_data<<EOF" >> $GITHUB_OUTPUT
          gh pr view $PR_NUM \
            --json title,body,author,files,additions,deletions,changedFiles,baseRefName,headRefName \
            --jq '{
              title: .title,
              body: .body,
              author: .author.login,
              files: .changedFiles,
              additions: .additions,
              deletions: .deletions,
              base: .baseRefName,
              head: .headRefName
            }' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "number=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Get changed files
        id: changed-files
        run: |
          BASE="${{ fromJSON(steps.pr-details.outputs.pr_data).base }}"
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only origin/$BASE...HEAD 2>/dev/null | tr '\n' ',' | sed 's/,$//' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Code Review
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are an expert code reviewer. Perform a thorough review of this pull request.
            
            ## Pull Request Details
            Title: ${{ fromJSON(steps.pr-details.outputs.pr_data).title }}
            Author: ${{ fromJSON(steps.pr-details.outputs.pr_data).author }}
            
            ## Changed Files
            ${{ steps.changed-files.outputs.files }}
            
            ## Your Review
            Analyze the changes and provide feedback on correctness, security, performance, and quality.
            
            Format:
            ```
            ## AI Code Review
            ### Summary
            ...
            ### Recommendations
            ...
            ### Overall Verdict
            ...
            ```
          gemini_model: gemini-1.5-flash
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Post review comment
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary || steps.gemini.outputs.error || 'An error occurred.' }}"
          PR_NUM="${{ steps.pr-details.outputs.number }}"
          
          cat > review_body.md << EOF
          ## AI Code Review 🤖
          
          $SUMMARY
          
          ---
          *Review generated by Gemini CLI*
          EOF
          
          gh pr comment $PR_NUM --body-file review_body.md
          
          if echo "$SUMMARY" | grep -qi "critical\|request changes"; then
            gh pr review $PR_NUM --body "Please address the critical issues." --request-changes
          else
            gh pr review $PR_NUM --body "Code review complete." --approve
          fi
