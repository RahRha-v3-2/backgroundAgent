name: "Continuous Issue Triage"

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of issues to triage"
        required: false
        default: "10"

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  triage-issues:
    name: "Triage Open Issues"
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Get open issues
        id: issues
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          echo "issues<<EOF" >> $GITHUB_OUTPUT
          gh issue list --state open --limit "$LIMIT" --json number,title,labels,createdAt --jq '.[] | "#\(.number): \(.title)\nLabels: \(.labels | map(.name) | join(", "))\nCreated: \(.createdAt)\n---"' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Triage Analysis
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0.1.21
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Analyze these open issues and provide insights:
            ${{ steps.issues.outputs.issues }}
          gemini_model: gemini-1.5-flash
          gemini_debug: ${{ vars.GEMINI_DEBUG == 'true' }}

      - name: Create triage report
        if: always()
        run: |
          SUMMARY="${{ steps.gemini.outputs.summary || steps.gemini.outputs.error || 'Error' }}"
          cat > report_body.md << EOF
          ## Daily Triage Report - $(date +'%Y-%m-%d')
          
          $SUMMARY
          EOF
          gh issue create --title "Daily Triage Report - $(date +'%Y-%m-%d')" --body-file report_body.md --label "triage-report,automated"
